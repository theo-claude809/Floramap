<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flora Log Map — Coopersburg</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f1ea; }
  #map { position: absolute; top: 64px; bottom: 0; left: 0; right: 0; }
  header {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: #2f3e2f;
    color: #f4f1ea;
    box-sizing: border-box;
    gap: 10px;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; line-height: 1.3; }
  header p { font-size: 10.5px; margin: 2px 0 0; opacity: 0.7; }
  .titleblock { min-width: 0; }
  .controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  button {
    background: #f4f1ea;
    color: #2f3e2f;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  button:active { opacity: 0.8; }
  #fileInput { display: none; }
  .legend {
    background: rgba(255,255,255,0.95);
    padding: 10px 12px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    font-size: 12px;
    line-height: 1.7;
  }
  .legend div { display: flex; align-items: center; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.3); }
  .status {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 500;
    background: rgba(255,255,255,0.92);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    color: #444;
    max-width: 280px;
  }
  .leaflet-popup-content b { display: block; margin-bottom: 2px; }
  .cat-tag {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 1px 6px;
    border-radius: 10px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="titleblock">
    <h1>🌿 Flora Log — Coopersburg, PA</h1>
    <p id="subtitle">No data loaded yet</p>
  </div>
  <div class="controls">
    <button id="loadBtn">Load Data</button>
    <input type="file" id="fileInput" accept="application/json,.json">
  </div>
</header>

<div id="map"></div>
<div class="status" id="statusBox">Tap "Load Data" and choose your flora-data.json export to plot sightings.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const categoryColors = {
  native: '#3a7d44',
  invasive: '#c1440e',
  weed: '#d4a017',
  ornamental: '#8e44ad',
  unsure: '#7f8c8d'
};

const map = L.map('map', { zoomControl: true }).setView([40.5115, -75.3890], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const legend = L.control({ position: 'topright' });
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = Object.entries(categoryColors).map(([cat, color]) =>
    `<div><span class="dot" style="background:${color}"></span>${cat}</div>`
  ).join('');
  return div;
};
legend.addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let hullLayer = L.layerGroup().addTo(map);

const STORAGE_KEY = 'floraLogData';

function renderData(sightings) {
  markerLayer.clearLayers();
  hullLayer.clearLayers();

  const withCoords = sightings.filter(s => typeof s.lat === 'number' && typeof s.lng === 'number');
  const skipped = sightings.length - withCoords.length;

  withCoords.forEach(s => {
    const color = categoryColors[s.category] || '#555';
    const marker = L.circleMarker([s.lat, s.lng], {
      radius: 9,
      fillColor: color,
      color: '#222',
      weight: 1,
      fillOpacity: 0.85
    });
    marker.bindPopup(`
      <b>${s.species}</b>
      ${s.date || ''}<br>
      ${s.notes || ''}
      <span class="cat-tag" style="background:${color}22; color:${color}; border:1px solid ${color}66;">${s.category}</span>
    `);
    markerLayer.addLayer(marker);
  });

  const bySpecies = {};
  withCoords.forEach(s => {
    if (!bySpecies[s.species]) bySpecies[s.species] = [];
    bySpecies[s.species].push([s.lat, s.lng]);
  });
  Object.entries(bySpecies).forEach(([species, pts]) => {
    if (pts.length > 1) {
      const sample = withCoords.find(s => s.species === species);
      const color = categoryColors[sample.category] || '#555';
      L.polygon(pts, {
        color: color,
        weight: 1.5,
        dashArray: '4,4',
        fillOpacity: 0.07
      }).addTo(hullLayer);
    }
  });

  if (withCoords.length > 0) {
    const bounds = L.latLngBounds(withCoords.map(s => [s.lat, s.lng]));
    map.fitBounds(bounds.pad(0.3));
  }

  document.getElementById('subtitle').textContent =
    `${withCoords.length} plotted` + (skipped > 0 ? ` · ${skipped} missing coordinates` : '');
  document.getElementById('statusBox').textContent =
    `Loaded ${sightings.length} sightings (${withCoords.length} on map). Tap "Load Data" to refresh with a newer export.`;
}

function tryLoadFromStorage() {
  const cached = localStorage.getItem(STORAGE_KEY);
  if (cached) {
    try {
      const data = JSON.parse(cached);
      renderData(data);
      return true;
    } catch (e) {
      console.warn('Cached flora data was invalid JSON', e);
    }
  }
  return false;
}

tryLoadFromStorage();

document.getElementById('loadBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const data = JSON.parse(evt.target.result);
      if (!Array.isArray(data)) throw new Error('Expected a JSON array of sightings');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderData(data);
    } catch (err) {
      document.getElementById('statusBox').textContent = 'Error reading file: ' + err.message;
    }
  };
  reader.readAsText(file);
});
</script>

</body>
</html>
